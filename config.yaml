# Physics Master Configuration

# Clarifier settings
clarifier:
  query_file: "instructions/BH.txt"
  schema_file_path: "agent/clarifier/schema"
  output_path: "outputs"
  max_key_concpets: 5

# LANDAU settings
landau:
  enabled: true
  library_local: "LANDAU/local_library"
  library_global: "LANDAU/global_library"
  methodology: "LANDAU/global_methodology"
  prior: "LANDAU/global_prior"

pipeline:
  parallel_processes: 3
  max_nodes: 21
  complete_score_threshold: 0.7

mcts:
  draft_expansion: 2
  revise_expansion: 2
  improve_expansion: 1
  exploration_constant: 1.414

visualization:
  enabled: true
